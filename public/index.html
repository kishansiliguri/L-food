<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Order Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#090b10;--s1:#0e111a;--s2:#131720;--s3:#181d28;
  --bd:rgba(255,255,255,.07);--bd2:rgba(255,255,255,.11);
  --gold:#f5a623;--blue:#4aa8d8;--green:#36c472;--red:#e05252;
  --text:#e6ecf8;--t2:#6b7a99;--t3:#252d42;--r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px}
body{display:flex;flex-direction:column;overflow:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}

/* Only new cards get entrance animation via JS class */
@keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card-new{animation:cardIn .25s ease forwards}

@keyframes overlayIn{from{opacity:0}to{opacity:1}}
@keyframes boxIn{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:none}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes toastIn{from{transform:translateX(-50%) translateY(8px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes badgePop{0%,100%{transform:scale(1)}50%{transform:scale(.82)}}
@keyframes accOpen{from{opacity:0;max-height:0}to{opacity:1;max-height:600px}}

/* ── TOPBAR ── */
#bar{display:flex;align-items:center;justify-content:space-between;height:54px;padding:0 18px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--bd2);gap:10px}
.logo{display:flex;align-items:center;gap:10px}
.logo-ico{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#f5a623,#d97000);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:0 2px 12px rgba(245,166,35,.3)}
.logo-name{font-size:15px;font-weight:800;letter-spacing:-.3px}
.logo-sub{font-size:9px;color:var(--t2);letter-spacing:.8px;font-weight:600;margin-top:1px}
#nbadge{background:var(--red);color:#fff;min-width:18px;height:18px;border-radius:9px;font-size:10px;font-weight:800;padding:0 4px;display:none;align-items:center;justify-content:center;animation:badgePop .9s ease-in-out infinite}
#nbadge.on{display:flex}
#clk{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--t2);background:var(--s2);border:1px solid var(--bd2);padding:5px 11px;border-radius:7px;white-space:nowrap}
#tbtn{background:linear-gradient(135deg,#f5a623,#d97000);border:none;color:#fff;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;box-shadow:0 2px 10px rgba(245,166,35,.28);transition:transform .14s}
#tbtn:hover{transform:scale(1.04)}

/* ── STATS BAR ── */
#stats{display:flex;background:var(--s1);border-bottom:1px solid var(--bd2);overflow-x:auto;flex-shrink:0}
.sp{display:flex;align-items:center;gap:7px;padding:8px 16px;border-right:1px solid var(--bd);cursor:pointer;transition:background .13s;flex-shrink:0;position:relative}
.sp:hover{background:var(--s2)}
.sp.on{background:var(--s2)}
.sp.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--gold)}
.sp-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.sp-n{font-size:15px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1}
.sp-l{font-size:9px;color:var(--t2);font-weight:700;letter-spacing:.5px;margin-top:1px}

/* ── MAIN ── */
#main{flex:1;display:flex;overflow:hidden}
#area{flex:1;overflow-y:auto;padding:14px}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:10px;align-items:start}
.empty-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:60px;color:var(--t3);grid-column:1/-1;font-weight:600;font-size:13px}
.empty-msg span:first-child{font-size:36px;opacity:.4}

/* ── ORDER CARD ── */
.card{background:var(--s1);border:1px solid var(--bd2);border-left:3px solid var(--t3);border-radius:var(--r);overflow:hidden}
.card.stnew{border-left-color:#f5a623}
.card.stprep{border-left-color:#4aa8d8}
.card.stdelay{border-left-color:#e05252}
.card.stready{border-left-color:#36c472}
.card.stdone{border-left-color:var(--t3)}
.card.stdeclined{border-left-color:#2a2a2a}

.c-top{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 13px 0}
.c-name{font-weight:700;font-size:14px;line-height:1.2}
.c-meta{font-size:10px;color:var(--t2);margin-top:2px}
.stag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;white-space:nowrap}
.delay-chip{background:rgba(224,82,82,.12);color:var(--red);border:1px solid rgba(224,82,82,.22);font-size:9px;font-weight:800;padding:2px 7px;border-radius:20px;display:none}
.delay-chip.on{display:inline-block}

.c-mid{padding:9px 13px}
.c-row{display:flex;justify-content:space-between;align-items:center}
.c-total{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--gold)}
.c-timer{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;display:none}
.c-note{margin-top:6px;font-size:11px;color:var(--t2);background:var(--s2);padding:5px 8px;border-radius:6px;border:1px solid var(--bd)}

/* progress bar - NO transition to avoid animation */
.pbar{height:3px;background:var(--s3)}
.pbar-fill{height:100%}

/* ── CARD FOOTER ── */
.c-foot{display:flex;align-items:center;gap:6px;padding:9px 13px;border-top:1px solid var(--bd);flex-wrap:wrap}
.arr-btn{display:inline-flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--bd2);color:var(--t2);border-radius:7px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .13s,color .13s;flex-shrink:0}
.arr-btn:hover{background:var(--s3);color:var(--text)}
.arr-btn.open{background:var(--s3);color:var(--text);border-color:rgba(245,166,35,.3)}
.arr-ico{font-size:10px;transition:transform .2s;display:inline-block}
.arr-btn.open .arr-ico{transform:rotate(180deg)}
.c-gap{flex:1}
.act{border:none;border-radius:7px;padding:6px 13px;font-size:11px;font-weight:800;cursor:pointer;font-family:inherit;transition:transform .13s;flex-shrink:0}
.act:hover{transform:scale(1.04)}
.act-ready{background:linear-gradient(135deg,#36c472,#15803d);color:#fff}
.act-done{background:linear-gradient(135deg,#4aa8d8,#1d6fa8);color:#fff}

/* ── ACCORDION PANELS ── */
.acc{display:none}
.acc.open{display:block;animation:accOpen .2s ease}

.items-panel{padding:10px 13px;border-top:1px solid var(--bd);background:var(--bg)}
.irow{display:flex;align-items:center;justify-content:space-between;padding:6px 9px;background:var(--s1);border-radius:7px;margin-bottom:4px;border:1px solid var(--bd)}
.irow:last-child{margin-bottom:0}
.iqty{width:21px;height:21px;background:rgba(245,166,35,.14);color:var(--gold);border-radius:5px;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-right:8px;flex-shrink:0}
.iname{color:#b8c4de;font-size:12px;flex:1}
.iprice{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t2)}

.bill-panel{padding:12px 13px;border-top:1px solid var(--bd);background:var(--bg)}
.bgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.bcell{background:var(--s1);border:1px solid var(--bd);border-radius:8px;padding:7px 9px}
.bcell-l{font-size:9px;font-weight:700;letter-spacing:.8px;color:var(--t2);text-transform:uppercase;margin-bottom:1px}
.bcell-v{font-size:12px;font-weight:600}
.bdiv{height:1px;background:var(--bd2);margin:8px 0}
.bline{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:3px}
.btotal{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd2)}
.btotal-l{font-size:13px;color:var(--t2);font-weight:600}
.btotal-v{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:800;color:var(--gold)}
.eta-row{display:flex;justify-content:space-between;align-items:center;background:rgba(74,168,216,.06);border:1px solid rgba(74,168,216,.17);border-radius:8px;padding:7px 10px;margin-bottom:9px}
.eta-lbl{font-size:9px;font-weight:800;letter-spacing:.8px;color:var(--blue);text-transform:uppercase;margin-bottom:1px}
.eta-val{font-size:12px;color:#b8c4de}
.eta-chip{font-size:10px;font-weight:700;color:var(--blue);background:rgba(74,168,216,.1);padding:2px 7px;border-radius:20px}

/* ── CHALKBOARD TIME PICKER ── */
.tp{margin-top:10px}
.tp-lbl{font-size:9px;font-weight:700;letter-spacing:1px;color:var(--t2);text-transform:uppercase;margin-bottom:7px}
.tp-track{display:flex;gap:4px;overflow-x:auto;background:#060d09;border:1px solid #101e12;border-radius:9px;padding:6px;scrollbar-width:none}
.tp-track::-webkit-scrollbar{display:none}
.tp-chip{flex-shrink:0;background:#0a1610;border:1.5px solid #172a1a;color:#3a6645;border-radius:7px;padding:7px 11px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .16s;display:flex;flex-direction:column;align-items:center;gap:1px}
.tp-chip:hover{border-color:#285038;color:#56a060}
.tp-chip.sel{background:#0e2016;border-color:var(--green);color:var(--green);box-shadow:0 0 10px rgba(54,196,114,.18)}
.tp-chip-m{font-size:13px;font-weight:700}
.tp-chip-s{font-size:7px;opacity:.5;font-family:'Inter',sans-serif;letter-spacing:.4px}
.tp-note{margin-top:6px;padding:6px 10px;background:rgba(54,196,114,.06);border:1px solid rgba(54,196,114,.15);border-radius:7px;font-size:11px;color:var(--green);display:none}
.tp-note.on{display:block}

/* ── CUSTOMER PANEL ── */
#cpanel{width:250px;flex-shrink:0;background:var(--s1);border-left:1px solid var(--bd2);display:flex;flex-direction:column}
.cp-hd{padding:12px 14px 9px;border-bottom:1px solid var(--bd2);flex-shrink:0}
.cp-title{font-size:9px;font-weight:800;letter-spacing:1.5px;color:var(--green);text-transform:uppercase}
.cp-sub{font-size:9px;color:var(--t3);margin-top:2px;font-weight:600;letter-spacing:.5px}
#cplist{flex:1;overflow-y:auto;padding:9px}
.cp-empty{color:var(--t3);font-size:12px;text-align:center;padding:36px 14px}
.cc{background:var(--s2);border:1px solid var(--bd2);border-radius:10px;padding:11px;margin-bottom:8px}
.cc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cc-name{font-weight:700;font-size:12px}
.cc-id{font-size:9px;color:var(--t2);margin-top:1px}
.ring-wrap{display:flex;justify-content:center;margin:4px 0 6px}
.ring-pos{position:relative}
.ri{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rt{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700}
.rs{font-size:7px;color:var(--t2);margin-top:1px;font-weight:600;letter-spacing:.4px}
.cc-ready{background:rgba(54,196,114,.08);border:1px solid rgba(54,196,114,.2);border-radius:8px;padding:8px;text-align:center;margin-bottom:6px}
.cc-ready-t{color:var(--green);font-weight:800;font-size:11px;margin-top:2px}
.cc-delay{background:rgba(224,82,82,.08);border:1px solid rgba(224,82,82,.2);border-radius:8px;padding:8px;text-align:center;margin-bottom:6px}
.cc-delay-t{color:var(--red);font-weight:800;font-size:11px;margin-top:2px}
.ccdiv{height:1px;background:var(--bd);margin:6px 0}
.cc-tot{display:flex;justify-content:space-between}
.cc-tot-l{font-size:10px;color:var(--t2)}
.cc-tot-v{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--gold)}

/* ── ALERT ── */
#ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:900;display:none;align-items:center;justify-content:center;padding:16px}
#ov.on{display:flex;animation:overlayIn .2s ease}
#abox{background:var(--s1);border:1.5px solid var(--gold);border-radius:16px;width:100%;max-width:360px;overflow:hidden;box-shadow:0 0 50px rgba(245,166,35,.18)}
.a-top{padding:20px 20px 14px;text-align:center;border-bottom:1px solid var(--bd2)}
#abell{font-size:42px;display:inline-block}
.a-title{font-size:19px;font-weight:800;color:var(--gold);margin-top:6px}
.a-sub{font-size:11px;color:var(--t2);margin-top:2px}
.a-body{padding:14px 18px}
.a-items{background:var(--s2);border-radius:9px;padding:11px 12px;margin-bottom:9px;border:1px solid var(--bd2)}
.a-irow{display:flex;justify-content:space-between;color:#b8c4de;font-size:13px;margin-bottom:3px}
.a-irow:last-child{margin-bottom:0}
.a-div{height:1px;background:var(--bd2);margin:7px 0}
.a-tot{display:flex;justify-content:space-between;font-weight:800;font-size:14px}
.a-note{background:rgba(245,166,35,.07);border:1px solid rgba(245,166,35,.17);border-radius:7px;padding:7px 10px;margin-bottom:9px;font-size:11px;color:#f5c76a;display:none}
.a-btns{display:flex;gap:7px}
.a-dec{flex:1;background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.22);color:var(--red);border-radius:8px;padding:10px;font-weight:700;font-size:12px;cursor:pointer;font-family:inherit;transition:background .14s}
.a-dec:hover{background:rgba(224,82,82,.2)}
.a-acc{flex:2;background:linear-gradient(135deg,#f5a623,#d97000);border:none;color:#fff;border-radius:8px;padding:10px;font-weight:800;font-size:12px;cursor:pointer;font-family:inherit;transition:transform .14s}
.a-acc:hover{transform:scale(1.03)}
#atp{display:none;padding:14px 18px;border-top:1px solid var(--bd2)}
#atp.on{display:block}
.atp-title{font-size:13px;font-weight:800;margin-bottom:2px}
.atp-sub{font-size:10px;color:var(--t2)}
.atp-track{display:flex;gap:4px;overflow-x:auto;background:#060d09;border:1px solid #101e12;border-radius:9px;padding:6px;scrollbar-width:none;margin-top:9px}
.atp-track::-webkit-scrollbar{display:none}
.atp-chip{flex-shrink:0;background:#0a1610;border:1.5px solid #172a1a;color:#3a6645;border-radius:7px;padding:8px 13px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .16s;display:flex;flex-direction:column;align-items:center;gap:2px}
.atp-chip:hover{border-color:#285038;color:#56a060}
.atp-chip.sel{background:#0e2016;border-color:var(--green);color:var(--green);box-shadow:0 0 10px rgba(54,196,114,.2)}
.atp-chip-m{font-size:15px;font-weight:800}
.atp-chip-s{font-size:7px;opacity:.5;font-family:'Inter',sans-serif}
.atp-note{margin-top:8px;padding:7px 10px;background:rgba(54,196,114,.06);border:1px solid rgba(54,196,114,.14);border-radius:7px;font-size:11px;color:var(--green);display:none}
.atp-note.on{display:block}
.atp-row{display:flex;gap:7px;margin-top:10px}
.atp-back{flex:1;background:transparent;border:1px solid var(--bd2);color:var(--t2);border-radius:8px;padding:9px;font-weight:600;font-size:11px;cursor:pointer;font-family:inherit;transition:background .14s}
.atp-back:hover{background:var(--s2)}
.atp-ok{flex:2;background:var(--s3);border:none;color:var(--t3);border-radius:8px;padding:9px;font-weight:800;font-size:12px;cursor:not-allowed;font-family:inherit;transition:all .18s}
.atp-ok.on{background:linear-gradient(135deg,#36c472,#15803d);color:#fff;cursor:pointer}
.atp-ok.on:hover{transform:scale(1.02)}

/* ── TOAST ── */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--s1);border:1px solid rgba(245,166,35,.38);color:var(--gold);padding:9px 20px;border-radius:30px;font-size:12px;font-weight:700;box-shadow:0 6px 22px rgba(0,0,0,.5);z-index:999;display:none;animation:toastIn .28s ease;white-space:nowrap}
#toast.err{border-color:rgba(224,82,82,.38);color:var(--red)}
#toast.on{display:block}

/* ── RESPONSIVE ── */
@media(max-width:960px){#cpanel{display:none}}
@media(max-width:640px){
  html,body{overflow:auto;height:auto}
  #main{flex-direction:column;overflow:visible}
  #area{overflow:visible}
  #grid{grid-template-columns:1fr}
  body{overflow:auto}
  #cpanel{display:flex;width:100%;border-left:none;border-top:1px solid var(--bd2)}
  #clk{display:none}
  #tbtn{padding:7px 11px;font-size:11px}
}
@media(max-width:380px){.bgrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="bar">
  <div class="logo">
    <div class="logo-ico">🏪</div>
    <div>
      <div class="logo-name">Order Dashboard</div>
      <div class="logo-sub">LIVE KITCHEN PANEL</div>
    </div>
    <div id="nbadge">0</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div id="clk">--:--:--</div>
    <button id="tbtn" onclick="simOrder()">🔔 New Order (Test)</button>
  </div>
</div>

<div id="stats">
  <div class="sp on" onclick="setFilter('all',this)">
    <div class="sp-dot" style="background:#6b7a99"></div>
    <div><div class="sp-n" id="sAll">0</div><div class="sp-l">ALL</div></div>
  </div>
  <div class="sp" onclick="setFilter('new',this)">
    <div class="sp-dot" style="background:#f5a623"></div>
    <div><div class="sp-n" id="sNew" style="color:#f5a623">0</div><div class="sp-l">NEW</div></div>
  </div>
  <div class="sp" onclick="setFilter('preparing',this)">
    <div class="sp-dot" style="background:#4aa8d8"></div>
    <div><div class="sp-n" id="sPre" style="color:#4aa8d8">0</div><div class="sp-l">PREPARING</div></div>
  </div>
  <div class="sp" onclick="setFilter('delayed',this)">
    <div class="sp-dot" style="background:#e05252"></div>
    <div><div class="sp-n" id="sDel" style="color:#e05252">0</div><div class="sp-l">DELAYED</div></div>
  </div>
  <div class="sp" onclick="setFilter('ready',this)">
    <div class="sp-dot" style="background:#36c472"></div>
    <div><div class="sp-n" id="sRdy" style="color:#36c472">0</div><div class="sp-l">READY</div></div>
  </div>
  <div class="sp" onclick="setFilter('done',this)">
    <div class="sp-dot" style="background:#252d42"></div>
    <div><div class="sp-n" id="sDone" style="color:#252d42">0</div><div class="sp-l">DONE</div></div>
  </div>
</div>

<div id="main">
  <div id="area">
    <div id="grid"></div>
  </div>
  <div id="cpanel">
    <div class="cp-hd">
      <div class="cp-title">📱 Customer View</div>
      <div class="cp-sub">LIVE STATUS</div>
    </div>
    <div id="cplist"></div>
  </div>
</div>

<!-- ALERT -->
<div id="ov">
  <div id="abox">
    <div id="astep1">
      <div class="a-top">
        <div id="abell">🔔</div>
        <div class="a-title">New Order!</div>
        <div class="a-sub" id="asub"></div>
      </div>
      <div class="a-body">
        <div class="a-items" id="aitems"></div>
        <div class="a-note" id="anote"></div>
        <div class="a-btns">
          <button class="a-dec" onclick="decline()">✕ Decline</button>
          <button class="a-acc" onclick="goTP()">Accept → Set Time</button>
        </div>
      </div>
    </div>
    <div id="atp">
      <div class="atp-title">⏱ Set Preparation Time</div>
      <div class="atp-sub">How long to prepare? Customer sees +5 min extra.</div>
      <div class="atp-track" id="atpTrack"></div>
      <div class="atp-note" id="atpNote"></div>
      <div class="atp-row">
        <button class="atp-back" onclick="goS1()">← Back</button>
        <button class="atp-ok" id="atpOk" onclick="confirmOrder()">Confirm ✓</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ══════════════════════════════════════════
   CONFIG
══════════════════════════════════════════ */
const TIMES = [5,10,15,20,25,30,40,45,60];
const S = {

function mk(id,customer,phone,address,status,items,total,note,etaSec,acceptedAt){
  return {id,customer,phone,address,status,items,total,note,etaSec,acceptedAt,
    ts:Date.now()-Math.random()*400000, selMin:null};

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
const Rs = n => '₹' + Math.round(n).toLocaleString('en-IN');
const pad = n => String(n).padStart(2,'0');
const cd  = s => s<=0 ? '00:00' : `${pad(Math.floor(s/60))}:${pad(s%60)}`;
function ago(ts){
  const s=Math.floor((Date.now()-ts)/1000);
  if(s<15)return'Just now'; if(s<60)return`${s}s ago`;
  if(s<3600)return`${Math.floor(s/60)}m ago`; return`${Math.floor(s/3600)}h ago`;
}
function rem(o){
  if(!o.etaSec||!o.acceptedAt)return null;
  return Math.max(0, o.etaSec - Math.floor((Date.now()-o.acceptedAt)/1000));
}
function isDelayed(o){
  return o.status==='preparing' && o.etaSec && o.acceptedAt &&
    (Date.now()-o.acceptedAt) > o.etaSec*1000;
}
function es(o){ return (o.status==='preparing'&&isDelayed(o)) ? 'delayed' : o.status; }

/* ══════════════════════════════════════════
   SOUND — 3-tone chime
══════════════════════════════════════════ */
function chime(){
  try{
    if(!Ctx) Ctx = new(window.AudioContext||window.webkitAudioContext)();
    [[523.25,0],[659.25,.15],[783.99,.3]].forEach(([f,d])=>{
      const o=Ctx.createOscillator(), g=Ctx.createGain();
      o.connect(g); g.connect(Ctx.destination);
      const t=Ctx.currentTime+d;
      o.type='sine'; o.frequency.setValueAtTime(f,t);
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.25,t+.04);
      g.gain.setValueAtTime(0.25,t+.12);
      g.gain.exponentialRampToValueAtTime(0.0001,t+1.8);
      o.start(t); o.stop(t+1.8);
    });
  }catch(e){}
}

/* ══════════════════════════════════════════
   CLOCK
══════════════════════════════════════════ */
function updateClock(){
  const n=new Date();
  document.getElementById('clk').textContent =
    `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
}

/* ══════════════════════════════════════════
   SVG RING (customer panel)
══════════════════════════════════════════ */
function ringHTML(tot,r,sz,sw){
  const c=sz/2, rad=(sz-sw*2)/2, ci=2*Math.PI*rad;
  const pct=tot>0?Math.max(0,r/tot):0;
  const off=ci*(1-pct);
  const col=pct>.5?'#36c472':pct>.2?'#f5a623':'#e05252';
  return `<div class="ring-pos" style="width:${sz}px;height:${sz}px">
    <svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)">
      <circle fill="none" stroke="var(--s3)" stroke-width="${sw}" cx="${c}" cy="${c}" r="${rad}"/>
      <circle fill="none" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"
        cx="${c}" cy="${c}" r="${rad}"
        stroke-dasharray="${ci.toFixed(1)}"
        stroke-dashoffset="${off.toFixed(1)}"/>
    </svg>
    <div class="ri">
      <span class="rt" style="color:${col}">${cd(r)}</span>
      <span class="rs">LEFT</span>
    </div>
  </div>`;
}

/* ══════════════════════════════════════════
   BUILD ONE CARD HTML (called only once per card)
══════════════════════════════════════════ */
function buildCard(o){
  const st=es(o), cfg=S[st]||S.new;
  const r=rem(o), del=st==='delayed';
  const iOpen=openI.has(o.id), bOpen=openB.has(o.id);

  /* timer element - always rendered, shown/hidden via display */
  let timerTxt='', timerCol='var(--blue)', timerVisible=false;
  if(o.status==='preparing' && o.etaSec && o.acceptedAt){
    timerVisible=true;
    if(del){ timerTxt='⚠️ Time up'; timerCol='var(--red)'; }
    else {
      timerTxt='⏱ '+cd(r);
      timerCol = r<120?'var(--red)':r<300?'var(--gold)':'var(--blue)';
    }
  }

  /* progress bar */
  let pct=0, pbc='#36c472';
  if(o.status==='preparing' && o.etaSec && o.acceptedAt && r!==null){
    pct = del ? 0 : Math.max(0, r/o.etaSec)*100;
    pbc = pct>50?'#36c472':pct>20?'#f5a623':'#e05252';
  }
  const showPbar = o.status==='preparing' && o.etaSec && o.acceptedAt;

  /* action button */
  let action='';
  if(o.status==='preparing'||del)
    action=`<button class="act act-ready" onclick="markReady('${o.id}')">✅ Mark Ready</button>`;
  else if(o.status==='ready')
    action=`<button class="act act-done" onclick="markDone('${o.id}')">📦 Delivered</button>`;

  /* items accordion */
  const itemsHTML = o.items.map(it=>`<div class="irow">
    <div style="display:flex;align-items:center;flex:1">
      <div class="iqty">${it.q}</div><span class="iname">${it.n}</span>
    </div>
    <span class="iprice">${Rs(it.p*it.q)}</span>
  </div>`).join('');

  /* bill accordion */
  const etaRow = o.etaSec ? `<div class="eta-row">
    <div><div class="eta-lbl">ETA (Customer)</div><div class="eta-val">${Math.floor(o.etaSec/60)} min shown</div></div>
    <span class="eta-chip">+5 min added</span>
  </div>` : '';

  const tpChips = (o.status==='preparing'||o.status==='new') ? `<div class="tp">
    <div class="tp-lbl">Change Prep Time</div>
    <div class="tp-track">${TIMES.map(t=>`<div class="tp-chip${o.selMin===t?' sel':''}" onclick="chgTime('${o.id}',${t},this)">
      <span class="tp-chip-m">${t}</span><span class="tp-chip-s">MIN</span>
    </div>`).join('')}</div>
    <div class="tp-note${o.selMin?' on':''}" id="tpn-${o.id}">${o.selMin?`✓ Customer will see <strong>${o.selMin+5} min</strong>`:''}</div>
  </div>` : '';

  const billLines = o.items.map(it=>
    `<div class="bline"><span>${it.q}× ${it.n}</span><span style="font-family:'JetBrains Mono',monospace">${Rs(it.p*it.q)}</span></div>`
  ).join('');

  return `<div class="card ${STCLASS[st]||''}" id="c-${o.id}" data-id="${o.id}">
    <div class="c-top">
      <div>
        <div class="c-name">${o.customer}</div>
        <div class="c-meta">${o.id} · ${o.address}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
        <span class="stag" style="background:${cfg.bg};color:${cfg.col};border:1px solid ${cfg.col}22">${cfg.icon} ${cfg.lbl}</span>
        <span class="delay-chip${del?' on':''}" id="dc-${o.id}">Delayed</span>
      </div>
    </div>
    <div class="c-mid">
      <div class="c-row">
        <span class="c-total">${Rs(o.total)}</span>
        <span class="c-timer" id="tmr-${o.id}" style="display:${timerVisible?'inline':'none'};color:${timerCol}">${timerTxt}</span>
      </div>
      ${o.note?`<div class="c-note">📝 ${o.note}</div>`:''}
    </div>
    ${showPbar?`<div class="pbar" id="pb-${o.id}"><div class="pbar-fill" id="pbf-${o.id}" style="width:${pct}%;background:${pbc}"></div></div>`:`<div class="pbar" id="pb-${o.id}" style="display:none"><div class="pbar-fill" id="pbf-${o.id}"></div></div>`}
    <div class="c-foot">
      <button class="arr-btn${iOpen?' open':''}" id="ibtn-${o.id}" onclick="togI('${o.id}')">
        Items (${o.items.length}) <span class="arr-ico">▾</span>
      </button>
      <button class="arr-btn${bOpen?' open':''}" id="bbtn-${o.id}" onclick="togB('${o.id}')">
        Bill Details <span class="arr-ico">▾</span>
      </button>
      <div class="c-gap"></div>
      <span id="actbtn-${o.id}">${action}</span>
    </div>
    <div class="acc items-panel${iOpen?' open':''}" id="ip-${o.id}">
      ${itemsHTML}
    </div>
    <div class="acc bill-panel${bOpen?' open':''}" id="bp-${o.id}">
      <div class="bgrid">
        <div class="bcell"><div class="bcell-l">Customer</div><div class="bcell-v">${o.customer}</div></div>
        <div class="bcell"><div class="bcell-l">Table / Address</div><div class="bcell-v">${o.address}</div></div>
        <div class="bcell"><div class="bcell-l">Phone</div><div class="bcell-v" style="font-family:'JetBrains Mono',monospace;font-size:11px">${o.phone}</div></div>
        <div class="bcell"><div class="bcell-l">Order Time</div><div class="bcell-v" id="ot-${o.id}">${ago(o.ts)}</div></div>
      </div>
      ${etaRow}
      <div class="bdiv"></div>
      ${billLines}
      <div class="btotal">
        <span class="btotal-l">Total Bill</span>
        <span class="btotal-v">${Rs(o.total)}</span>
      </div>
      ${tpChips}
    </div>
  </div>`;
}

/* ══════════════════════════════════════════
   SMART DOM UPDATE — only changes text/style
   on existing cards, no innerHTML replacement
══════════════════════════════════════════ */
function updateCardDynamic(o){
  const r=rem(o), del=isDelayed(o), st=es(o);

  /* timer */
  const tmr=document.getElementById('tmr-'+o.id);
  if(tmr){
    if(o.status==='preparing' && o.etaSec && o.acceptedAt){
      tmr.style.display='inline';
      if(del){ tmr.textContent='⚠️ Time up'; tmr.style.color='var(--red)'; }
      else {
        tmr.textContent='⏱ '+cd(r);
        tmr.style.color = r<120?'var(--red)':r<300?'var(--gold)':'var(--blue)';
      }
    } else {
      tmr.style.display='none';
    }
  }

  /* progress bar */
  const pbEl=document.getElementById('pb-'+o.id);
  const pbfEl=document.getElementById('pbf-'+o.id);
  if(pbEl && pbfEl){
    if(o.status==='preparing' && o.etaSec && o.acceptedAt && r!==null){
      pbEl.style.display='';
      const pct=del?0:Math.max(0,r/o.etaSec)*100;
      const bc=pct>50?'#36c472':pct>20?'#f5a623':'#e05252';
      pbfEl.style.width=pct+'%';
      pbfEl.style.background=bc;
    } else {
      pbEl.style.display='none';
    }
  }

  /* delay chip */
  const dc=document.getElementById('dc-'+o.id);
  if(dc) dc.className='delay-chip'+(del?' on':'');

  /* card border color class */
  const card=document.getElementById('c-'+o.id);
  if(card){
    const wantClass=STCLASS[st]||'';
    const cur=Object.values(STCLASS);
    cur.forEach(c=>card.classList.remove(c));
    if(wantClass) card.classList.add(wantClass);
  }

  /* status tag */
  const cfg=S[st]||S.new;
  const stag=card&&card.querySelector('.stag');
  if(stag){
    stag.textContent=cfg.icon+' '+cfg.lbl;
    stag.style.background=cfg.bg;
    stag.style.color=cfg.col;
    stag.style.border=`1px solid ${cfg.col}22`;
  }

  /* action button */
  const actEl=document.getElementById('actbtn-'+o.id);
  if(actEl){
    let action='';
    if(o.status==='preparing'||del)
      action=`<button class="act act-ready" onclick="markReady('${o.id}')">✅ Mark Ready</button>`;
    else if(o.status==='ready')
      action=`<button class="act act-done" onclick="markDone('${o.id}')">📦 Delivered</button>`;
    if(actEl.innerHTML !== action) actEl.innerHTML=action;
  }

  /* order time (changes every minute) */
  const otEl=document.getElementById('ot-'+o.id);
  if(otEl) otEl.textContent=ago(o.ts);
}

/* ══════════════════════════════════════════
   RENDER GRID — smart: insert/remove cards,
   never re-render existing ones
══════════════════════════════════════════ */
function renderGrid(){
  const grid=document.getElementById('grid');
  const filtered=orders.filter(o=>{
    if(curF==='all')return true;
    if(curF==='delayed')return isDelayed(o);
    return o.status===curF;
  });

  if(!filtered.length){
    grid.innerHTML=`<div class="empty-msg"><span>📋</span><span>No orders in this category</span></div>`;
    renderedIds.clear();
    return;
  }

  // Remove empty message if present
  const empty=grid.querySelector('.empty-msg');
  if(empty) empty.remove();

  // IDs that should be visible
  const wantIds=new Set(filtered.map(o=>o.id));

  // Remove cards that are no longer in filter
  renderedIds.forEach(id=>{
    if(!wantIds.has(id)){
      const el=document.getElementById('c-'+id);
      if(el) el.remove();
      renderedIds.delete(id);
    }
  });

  // Insert new cards or reorder
  filtered.forEach((o,i)=>{
    if(!renderedIds.has(o.id)){
      // New card — build and insert
      const tmp=document.createElement('div');
      tmp.innerHTML=buildCard(o);
      const card=tmp.firstElementChild;
      card.classList.add('card-new'); // entrance animation only for new cards
      // Insert at correct position
      const children=Array.from(grid.children).filter(c=>!c.classList.contains('empty-msg'));
      if(i>=children.length){ grid.appendChild(card); }
      else { grid.insertBefore(card, children[i]); }
      renderedIds.add(o.id);
    } else {
      // Existing card — only update dynamic parts (no innerHTML replacement)
      updateCardDynamic(o);
    }
  });
}

/* ══════════════════════════════════════════
   CUSTOMER PANEL — full rebuild ok (small)
══════════════════════════════════════════ */
function renderCust(){
  const active=orders.filter(o=>['preparing','ready'].includes(o.status));
  const el=document.getElementById('cplist');
  if(!active.length){ el.innerHTML=`<div class="cp-empty">📭<br>No active orders</div>`; return; }
  el.innerHTML=active.map(o=>{
    const st=es(o), cfg=S[st]||S.preparing, r=rem(o), del=st==='delayed';
    let mid='';
    if(o.status==='preparing'&&!del&&o.etaSec&&r!==null)
      mid=`<div class="ring-wrap">${ringHTML(o.etaSec,r,62,4)}</div>`;
    else if(del)
      mid=`<div class="cc-delay"><div style="font-size:18px">⚠️</div><div class="cc-delay-t">Running Late...</div></div>`;
    else if(o.status==='ready')
      mid=`<div class="cc-ready"><div style="font-size:18px">🎉</div><div class="cc-ready-t">Order is Ready!</div></div>`;
    return `<div class="cc">
      <div class="cc-top">
        <div><div class="cc-name">${o.customer}</div><div class="cc-id">${o.id}</div></div>
        <span class="stag" style="background:${cfg.bg};color:${cfg.col};border:1px solid ${cfg.col}22;font-size:9px">${cfg.icon}</span>
      </div>
      ${mid}
      <div class="ccdiv"></div>
      <div class="cc-tot"><span class="cc-tot-l">Total</span><span class="cc-tot-v">${Rs(o.total)}</span></div>
    </div>`;
  }).join('');
}

/* ══════════════════════════════════════════
   STATS
══════════════════════════════════════════ */
function renderStats(){
  const n=orders.filter(o=>o.status==='new').length;
  document.getElementById('sAll').textContent=orders.length;
  document.getElementById('sNew').textContent=n;
  document.getElementById('sPre').textContent=orders.filter(o=>o.status==='preparing'&&!isDelayed(o)).length;
  document.getElementById('sDel').textContent=orders.filter(o=>isDelayed(o)).length;
  document.getElementById('sRdy').textContent=orders.filter(o=>o.status==='ready').length;
  document.getElementById('sDone').textContent=orders.filter(o=>o.status==='done').length;
  const b=document.getElementById('nbadge');
  b.textContent=n; b.classList.toggle('on',n>0);
}

/* ══════════════════════════════════════════
   TICK — runs every second
   Only updates clock, dynamic card fields,
   customer panel. Does NOT rebuild grid HTML.
══════════════════════════════════════════ */
function tick(){
  updateClock();
  renderStats();
  // Update only dynamic parts of existing cards
  orders.forEach(o=>{
    if(renderedIds.has(o.id)) updateCardDynamic(o);
  });
  // Customer panel is small, full rebuild is fine
  renderCust();
}

/* ══════════════════════════════════════════
   FULL RENDER — called only on structural changes
   (filter change, new order, accept/decline)
══════════════════════════════════════════ */
function fullRender(){
  renderStats();
  renderGrid();
  renderCust();
}

/* ══════════════════════════════════════════
   ACCORDION
══════════════════════════════════════════ */
function togI(id){
  openI.has(id)?openI.delete(id):openI.add(id);
  const panel=document.getElementById('ip-'+id);
  const btn=document.getElementById('ibtn-'+id);
  if(panel){ panel.classList.toggle('open', openI.has(id)); }
  if(btn){ btn.classList.toggle('open', openI.has(id)); }
}
function togB(id){
  openB.has(id)?openB.delete(id):openB.add(id);
  const panel=document.getElementById('bp-'+id);
  const btn=document.getElementById('bbtn-'+id);
  if(panel){ panel.classList.toggle('open', openB.has(id)); }
  if(btn){ btn.classList.toggle('open', openB.has(id)); }
}

/* ══════════════════════════════════════════
   ACTIONS
══════════════════════════════════════════ */
function setFilter(f,el){
  curF=f;
  document.querySelectorAll('.sp').forEach(p=>p.classList.remove('on'));
  el.classList.add('on');
  renderedIds.clear();
  fullRender();
}

function markReady(id){
  orders=orders.map(o=>o.id===id?{...o,status:'ready',etaSec:null,acceptedAt:null}:o);
  // Remove card from DOM so it gets rebuilt fresh (status changed)
  renderedIds.delete(id);
  toast('🎉 Order is ready! Customer notified.');
  fullRender();
}

function markDone(id){
  orders=orders.map(o=>o.id===id?{...o,status:'done'}:o);
  openI.delete(id); openB.delete(id);
  renderedIds.delete(id);
  toast('📦 Order delivered!');
  fullRender();
}

function chgTime(id,min,el){
  orders=orders.map(o=>o.id===id?{...o,selMin:min,etaSec:(min+5)*60,acceptedAt:Date.now()}:o);
  // Update chips visually without re-render
  el.closest('.tp-track').querySelectorAll('.tp-chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  const n=document.getElementById('tpn-'+id);
  if(n){ n.className='tp-note on'; n.innerHTML=`✓ Customer will see <strong>${min+5} min</strong>`; }
  renderStats();
  renderCust();
  toast(`⏱ Time updated — customer sees ${min+5} min`);
}

/* ══════════════════════════════════════════
   ALERT
══════════════════════════════════════════ */
function showAlert(){
  if(!alertQ.length){ hideAlert(); return; }
  const o=alertQ[0];
  document.getElementById('ov').classList.add('on');
  document.getElementById('astep1').style.display='';
  document.getElementById('atp').className='';
  document.getElementById('asub').textContent=`${o.id} · ${o.customer} · ${o.address}`;
  document.getElementById('aitems').innerHTML=
    o.items.map(it=>`<div class="a-irow"><span>${it.q}× ${it.n}</span><span>${Rs(it.p*it.q)}</span></div>`).join('')+
    `<div class="a-div"></div><div class="a-tot"><span>Total</span><span style="color:var(--gold)">${Rs(o.total)}</span></div>`;
  const an=document.getElementById('anote');
  if(o.note){ an.textContent='📝 '+o.note; an.style.display='block'; }
  else { an.style.display='none'; }
  // Shake the box
  const ab=document.getElementById('abox');
  ab.style.animation='none'; void ab.offsetWidth;
  ab.style.animation='shake .4s ease, boxIn .28s ease';
  clearInterval(bellIv); chime();
  bellIv=setInterval(chime, 3200);
}
function hideAlert(){
  document.getElementById('ov').classList.remove('on');
  clearInterval(bellIv); bellIv=null;
}
function goTP(){
  selMin=null;
  document.getElementById('astep1').style.display='none';
  document.getElementById('atp').className='on';
  document.getElementById('atpTrack').innerHTML=TIMES.map(t=>
    `<div class="atp-chip" onclick="pickMin(${t},this)"><span class="atp-chip-m">${t}</span><span class="atp-chip-s">MIN</span></div>`
  ).join('');
  document.getElementById('atpNote').className='atp-note';
  document.getElementById('atpOk').className='atp-ok';
}
function pickMin(min,el){
  selMin=min;
  document.querySelectorAll('.atp-chip').forEach(c=>c.classList.remove('sel'));
  el.classList.add('sel');
  document.getElementById('atpNote').className='atp-note on';
  document.getElementById('atpNote').innerHTML=`✓ Customer will see: <strong>${min+5} minutes</strong>`;
  document.getElementById('atpOk').className='atp-ok on';
}
function goS1(){
  document.getElementById('atp').className='';
  document.getElementById('astep1').style.display='';
}
function confirmOrder(){
  if(!selMin)return;
  const o=alertQ.shift();
  const eta=(selMin+5)*60;
  orders=orders.map(x=>x.id===o.id?{...x,status:'preparing',etaSec:eta,acceptedAt:Date.now(),selMin}:x);
  renderedIds.delete(o.id); // force rebuild of this card
  toast(`✅ Order ${o.id} accepted — customer sees ${selMin+5} min`);
  hideAlert(); fullRender();
  if(alertQ.length) setTimeout(showAlert,600);
}
function decline(){
  const o=alertQ.shift();
  orders=orders.map(x=>x.id===o.id?{...x,status:'declined'}:x);
  renderedIds.delete(o.id);
  toast('Order declined','err');
  hideAlert(); fullRender();
  if(alertQ.length) setTimeout(showAlert,600);
}
